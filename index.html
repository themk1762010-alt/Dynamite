<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamite - Web Player</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="logo" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; margin-right: 8px; margin-top: -4px;"> Dynamite
            </div>
            
            <div class="nav-links">
                <a href="#" class="nav-item active"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="#" class="nav-item"><i class="fas fa-search"></i> <span>Search</span></a>
                <a href="#" class="nav-item"><i class="fas fa-book"></i> <span>Your Library</span></a>
            </div>

            <div class="playlists-container">
                <div class="playlists-header">
                    <button class="create-playlist"><i class="fas fa-plus"></i></button>
                    <span>Playlists</span>
                </div>
                <div class="playlist-list" id="playlist-list">
                    <a href="#" class="playlist-item active" data-playlist="ENGLISH">ENGLISH</a>
                    <a href="#" class="playlist-item" data-playlist="TAMIL & OTHER">TAMIL & OTHER</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <div class="topbar">
                <div class="nav-controls">
                    <button class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="What do you want to listen to?">
                </div>
                
                <div class="user-profile">
                    <button class="upgrade-btn">Explore Premium</button>
                    <div class="profile-icon"><i class="far fa-user"></i></div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-scrollable">
                <div class="playlist-header-view">
                    <div class="playlist-cover">
                        <img src="custom_cover.jpg" alt="Playlist Cover" style="width: 100%; height: 100%; object-fit: cover; box-shadow: 0 4px 60px rgba(0,0,0,.5);">
                    </div>
                    <div class="playlist-details">
                        <span class="playlist-type">Playlist</span>
                        <h1 id="current-playlist-title">ENGLISH</h1>
                        <p class="playlist-description" id="current-playlist-desc">Your favorite English tracks.</p>
                        <div class="playlist-stats">
                            <span class="spotify-brand">Spotify</span> • <span id="song-count">3 songs</span>
                        </div>
                    </div>
                </div>

                <div class="playlist-controls-row">
                    <button class="play-all-btn"><i class="fas fa-play"></i></button>
                    <button class="icon-btn"><i class="far fa-heart"></i></button>
                    <button class="icon-btn"><i class="fas fa-ellipsis-h"></i></button>
                </div>

                <!-- Song List -->
                <div class="songs-list-container">
                    <div class="songs-header">
                        <div class="col-title">#</div>
                        <div class="col-title">Title</div>
                        <div class="col-title">Album</div>
                        <div class="col-title"><i class="far fa-clock"></i></div>
                    </div>
                    <div class="songs-body" id="songs-body">
                        <!-- Songs will be injected here via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Player -->
    <div class="player">
        <div class="player-left">
            <div class="now-playing-img" id="now-playing-img">
                <img src="custom_cover.jpg" alt="cover" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
            </div>
            <div class="now-playing-info">
                <div class="track-name" id="track-name">---</div>
                <div class="artist-name" id="artist-name">---</div>
            </div>
            <button class="icon-btn like-btn"><i class="far fa-heart"></i></button>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <button class="icon-btn"><i class="fas fa-random"></i></button>
                <button class="icon-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                <button class="icon-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
                <button class="icon-btn"><i class="fas fa-redo-alt"></i></button>
            </div>
            <div class="progress-container">
                <span class="time-current" id="time-current">0:00</span>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-bg" id="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                </div>
                <span class="time-total" id="time-total">0:00</span>
            </div>
        </div>
        
        <div class="player-right">
            <button class="icon-btn"><i class="fas fa-bars"></i></button>
            <button class="icon-btn"><i class="fas fa-desktop"></i></button>
            <div class="volume-container">
                <button class="icon-btn"><i class="fas fa-volume-up"></i></button>
                <div class="progress-bar-wrapper volume-bar">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
